{% extends 'admin_base.html' %}
{% block title %}تعيين كلمة مرور جديدة - لوحة التحكم{% endblock %}

{% block admin_content %}
<div class="login-page">
    <div class="container">
        <div class="login-card" style="max-width: 500px;">
            <div class="login-header">
                <div class="login-logo">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Hiraa Logo">
                </div>
                <h2>تعيين كلمة مرور جديدة</h2>
                <p>يرجى إدخال كلمة المرور الجديدة وتأكيدها. يمكنك أيضاً تغيير اسم المستخدم إذا رغبت في ذلك.</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="login-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم (اختياري - لتغييره)</label>
                    <div class="input-with-icon">
                        <span class="icon">👤</span>
                        <input type="text" id="username" name="username"
                            placeholder="اتركه فارغاً للاحتفاظ بالاسم الحالي">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور الجديدة</label>
                    <div class="input-with-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور الجديدة"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">تأكيد كلمة المرور الجديدة</label>
                    <div class="input-with-icon">
                        <span class="icon">🔒</span>
                        <input type="password" id="confirm_password" name="confirm_password"
                            placeholder="أعد إدخال كلمة المرور" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">تحديث بيانات الدخول</button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 جمعية حراء للحلول الاجتماعية</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Reuse the exact styles from forgot_password.html for consistency */
    .login-page {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8fcf9 0%, #e8f5e9 100%);
        padding: 40px 0;
    }

    .login-card {
        width: 100%;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(26, 94, 58, 0.1);
        border: 1px solid rgba(26, 94, 58, 0.1);
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-logo img {
        height: 80px;
        margin-bottom: 15px;
    }

    .login-header h2 {
        color: var(--green-dark);
        font-size: 1.8rem;
        margin-bottom: 5px;
    }

    .login-header p {
        color: var(--gray-600);
        margin-top: 10px;
        line-height: 1.5;
    }

    .login-form .form-group {
        margin-bottom: 20px;
    }

    .login-form label {
        display: block;
        margin-bottom: 8px;
        color: var(--gray-700);
        font-weight: 500;
        text-align: right;
    }

    .input-with-icon {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-with-icon .icon {
        position: absolute;
        right: 15px;
        color: var(--gray-400);
    }

    .input-with-icon input {
        width: 100%;
        padding: 12px 45px 12px 15px;
        border: 2px solid #eef2f0;
        border-radius: 12px;
        font-family: inherit;
        transition: all 0.3s ease;
        background: white;
    }

    .input-with-icon input:focus {
        border-color: var(--green-primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
    }

    .btn-block {
        width: 100%;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        background-color: var(--green-primary);
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .btn-block:hover {
        background-color: var(--green-dark);
    }

    .login-footer {
        text-align: center;
        margin-top: 30px;
        font-size: 0.8rem;
        color: var(--gray-400);
    }
</style>
{% endblock %}
